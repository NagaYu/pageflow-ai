<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>[Demo] Internal Workflow System</title>
  <style>
    body { font-family: -apple-system, "Segoe UI", sans-serif; background: #eef1f6; margin: 0; padding: 32px; color: #1f2937; }
    .wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 20px; }
    .note { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
    .card { background: #fff; border: 1px solid #d6dbe3; border-radius: 8px; padding: 20px 24px; margin-bottom: 24px; }
    h2 { font-size: 15px; border-left: 4px solid #4f6ef7; padding-left: 8px; }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; width: 160px; font-size: 13px; padding: 10px 8px; background: #f3f5f9; border: 1px solid #e2e6ee; }
    td { padding: 8px; border: 1px solid #e2e6ee; }
    input[type="text"], input[type="email"], input[type="tel"], input[type="date"],
    input[type="number"], select, textarea { width: 100%; box-sizing: border-box; padding: 7px 9px; border: 1px solid #c8cfdb; border-radius: 4px; font-size: 13px; }
    textarea { min-height: 70px; }
    button { background: #4f6ef7; color: #fff; border: none; border-radius: 6px; padding: 10px 22px; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Internal Workflow System (Demo)</h1>
    <p class="note">A demo page for testing PageFlow AI. Try the autofill from the popup's "⚡ Mapper" and "🧾 Expense" tabs.</p>

    <div class="card">
      <h2>Meeting Notes / Inquiry Registration</h2>
      <table>
        <tr><th><label for="f-name">Name</label></th><td><input type="text" id="f-name" name="name"></td></tr>
        <tr><th><label for="f-company">Company</label></th><td><input type="text" id="f-company" name="company"></td></tr>
        <tr><th><label for="f-dept">Department</label></th><td><input type="text" id="f-dept" name="department"></td></tr>
        <tr><th><label for="f-email">Email</label></th><td><input type="email" id="f-email" name="email"></td></tr>
        <tr><th><label for="f-tel">Phone</label></th><td><input type="tel" id="f-tel" name="tel"></td></tr>
        <tr><th><label for="f-subject">Subject</label></th><td><input type="text" id="f-subject" name="subject"></td></tr>
        <tr><th><label for="f-body">Description</label></th><td><textarea id="f-body" name="body"></textarea></td></tr>
      </table>
    </div>

    <div class="card">
      <h2>Expense Report</h2>
      <table>
        <tr><th><label for="e-date">Date</label></th><td><input type="date" id="e-date" name="expense_date"></td></tr>
        <tr><th><label for="e-amount">Amount</label></th><td><input type="number" step="0.01" id="e-amount" name="amount"></td></tr>
        <tr><th><label for="e-vendor">Vendor</label></th><td><input type="text" id="e-vendor" name="vendor"></td></tr>
        <tr><th><label for="e-category">Category</label></th><td>
          <select id="e-category" name="category">
            <option value="">Please select</option>
            <option>Travel</option>
            <option>Meals &amp; Entertainment</option>
            <option>Office Supplies</option>
            <option>Books &amp; Subscriptions</option>
            <option>Communications</option>
            <option>Utilities</option>
            <option>Software &amp; Subscriptions</option>
            <option>Lodging</option>
            <option>Miscellaneous</option>
          </select>
        </td></tr>
        <tr><th><label for="e-memo">Memo</label></th><td><input type="text" id="e-memo" name="memo"></td></tr>
      </table>
    </div>

    <button type="button">Submit (this demo button does nothing)</button>
  </div>
</body>
</html>
